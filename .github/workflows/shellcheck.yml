name: ShellCheck

on:
  push:
    paths:
      - 'scripts/**'
  pull_request:
    paths:
      - 'scripts/**'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          # zsh nicht nativ unterstützt – bash als nächste Näherung
          check_together: 'yes'
          additional_files: 'scripts/*.sh'
        env:
          SHELLCHECK_OPTS: >-
            --shell=bash
            --severity=warning
            --exclude=SC1090,SC1091,SC2034
